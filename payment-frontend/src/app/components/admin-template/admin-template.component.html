<mat-toolbar color="primary">
  <button mat-icon-button (click)="drawer.toggle()"><mat-icon>menu</mat-icon></button>
  <span>Student Payment App</span>
  <span class="spacer"></span>
  <span>{{ authService.getUsername() }}</span>
  <button mat-button (click)="authService.logout()">Logout</button>
</mat-toolbar>

<mat-drawer-container class="layout">
  <mat-drawer #drawer mode="side" opened class="drawer">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard"><mat-icon>dashboard</mat-icon><span>Dashboard</span></a>
      <a mat-list-item routerLink="/students"><mat-icon>school</mat-icon><span>Students</span></a>
      <a mat-list-item routerLink="/payments"><mat-icon>payments</mat-icon><span>Payments</span></a>
      <a mat-list-item routerLink="/payments/new" *ngIf="authService.hasRole('ADMIN')"><mat-icon>upload_file</mat-icon><span>New Payment</span></a>
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content class="content">
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>

<div class="page">
  <mat-card>
    <mat-card-title>New Payment</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field class="full-width">
          <mat-label>Student code</mat-label>
          <input matInput formControlName="studentCode" placeholder="STD001">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Type</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="date">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <p><input type="file" accept="application/pdf" (change)="onFileSelected($event)"></p>
        <p style="color: #c62828" *ngIf="error">{{ error }}</p>
        <button mat-raised-button color="primary" type="submit">Save Payment</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="page">
  <mat-card class="card">
    <mat-card-title>Payments</mat-card-title>
    <mat-card-content>
      <div class="actions">
        <mat-form-field>
          <mat-label>Recherche</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Student, type, status">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Status</mat-label>
          <mat-select (selectionChange)="filterStatus($event.value)" value="ALL">
            <mat-option value="ALL">ALL</mat-option>
            <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field>
          <mat-label>Type</mat-label>
          <mat-select (selectionChange)="filterType($event.value)" value="ALL">
            <mat-option value="ALL">ALL</mat-option>
            <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
          </mat-select>
        </mat-form-field>

        <span class="spacer"></span>
        <button mat-raised-button color="primary" routerLink="/payments/new" *ngIf="authService.hasRole('ADMIN')">New Payment</button>
      </div>

      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let p">{{ p.id }}</td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
          <td mat-cell *matCellDef="let p">{{ p.date }}</td>
        </ng-container>

        <ng-container matColumnDef="studentFullName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Student</th>
          <td mat-cell *matCellDef="let p">{{ p.studentFullName }}</td>
        </ng-container>

        <ng-container matColumnDef="studentCode">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
          <td mat-cell *matCellDef="let p">{{ p.studentCode }}</td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
          <td mat-cell *matCellDef="let p">{{ p.amount }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
          <td mat-cell *matCellDef="let p">{{ p.type }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let p">{{ p.status }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let p" class="actions">
            <button mat-button color="primary" (click)="detail(p)">Detail</button>
            <button mat-button (click)="openFile(p)">PDF</button>
            <mat-form-field *ngIf="authService.hasRole('ADMIN')" style="width: 135px;">
              <mat-label>Status</mat-label>
              <mat-select [value]="p.status" (selectionChange)="updateStatus(p, $event.value)">
                <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
              </mat-select>
            </mat-form-field>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>

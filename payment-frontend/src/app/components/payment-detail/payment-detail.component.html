<div class="page" *ngIf="payment">
  <mat-card>
    <mat-card-title>Payment Detail #{{ payment.id }}</mat-card-title>
    <mat-card-content>
      <p><b>Date:</b> {{ payment.date }}</p>
      <p><b>Amount:</b> {{ payment.amount }}</p>
      <p><b>Type:</b> {{ payment.type }}</p>
      <p><b>Status:</b> {{ payment.status }}</p>
      <p><b>Student:</b> {{ payment.studentFullName }} / {{ payment.studentCode }}</p>
      <p><b>Filière:</b> {{ payment.studentProgramId }}</p>

      <div class="actions">
        <button mat-raised-button color="primary" (click)="openFile()">Open PDF</button>
        <mat-form-field *ngIf="authService.hasRole('ADMIN')">
          <mat-label>Status</mat-label>
          <mat-select [value]="payment.status" (selectionChange)="updateStatus($event.value)">
            <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>
</div>

spring.application.name=payment-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:payments-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# 64+ characters for HMAC SHA-256 JWT signing
app.security.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.security.jwt.expiration-minutes=1440
